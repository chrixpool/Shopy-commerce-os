services:
  - type: web
    name: Shopy-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @shopy/shared build && pnpm --filter @shopy/api db:generate && pnpm --filter @shopy/api build
    startCommand: pnpm --filter @shopy/api start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: API_INTERNAL_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: INTEGRATION_SECRET_KEY
        sync: false
      - key: SHOPIFY_API_VERSION
        value: 2026-01
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: SHOPIFY_ALLOWED_SCOPES
        value: read_orders,read_products,read_customers,read_inventory,read_locations
      - key: SHOPIFY_DEFAULT_SYNC_DAYS
        value: 30
      - key: AI_PROVIDER
        value: local
      - key: EMAIL_PROVIDER
        value: disabled
      - key: SMS_PROVIDER
        value: disabled
